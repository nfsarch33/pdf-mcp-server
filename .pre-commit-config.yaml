# Layered Gitleaks (fast regex) + TruffleHog (live verification) pre-push hook.
# Source of truth: cursor-global-kb/templates/.pre-commit-config.yaml (v18725-3).
# Rule: ~/.cursor/rules/00-p0-secrets-pre-push-hook.mdc
# SOP:   sop/secrets-pre-push-hook.md
#
# Install: make precommit-install   (auto-installs pre-commit==3.8.0 if missing)
# Smoke:   echo 'AKIAIOSFODNN7EXAMPLE' >> /tmp/test.py && git add . && git commit -m noop && git push
#          -> push MUST be blocked.
#
# Custom rules live in .gitleaks.toml (one rule per pattern class — see template).
# Tune noise with .gitleaksignore (fingerprint hashes, NOT rule IDs).

repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      # Override the default gitleaks hook entry point to scan the entire
      # git history (not just staged files). The upstream `id: gitleaks` hook
      # uses `gitleaks protect --staged` which only sees staged-but-uncommitted
      # changes. For pre-push we want full-history scanning so committed secrets
      # are detected too.
      - id: gitleaks
        name: Gitleaks (full-history scan)
        stages: [pre-push]
        # Override the entry: scan the entire repo with our custom ruleset.
        # --no-banner keeps output clean; --redact hides the secret in logs.
        entry: gitleaks detect --no-banner --redact --config .gitleaks.toml --source .
        language: golang
        # pre-push scans the entire repo, not per-file.
        pass_filenames: false

  - repo: https://github.com/trufflesecurity/trufflehog
    rev: v3.95.9
    hooks:
      - id: trufflehog
        name: TruffleHog (live verification)
        # Verify the key still works on the upstream provider. --only-verified
        # cuts noise from test fixtures + synthetic keys. --fail exits non-zero
        # when a verified live secret is found.
        entry: trufflehog git file://. --since-commit HEAD --only-verified --fail
        language: system
        stages: [pre-push]
        # TruffleHog scans the entire repo, not per-file.
        pass_filenames: false