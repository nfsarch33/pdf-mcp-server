name: Feature request (pdf-mcp)
description: Propose a new pdf-mcp capability with acceptance criteria and a test plan.
title: "feat: <short description>"
labels: ["feature"]
body:
  - type: markdown
    attributes:
      value: |
        Use this when proposing a new pdf-mcp feature, CLI command, MCP tool, or significant enhancement.

  - type: textarea
    id: problem
    attributes:
      label: Problem / goal
      description: What user problem are we solving? What outcome do we want?
      placeholder: "As a user, I want to … so that …"
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed approach (KISS)
      description: High-level plan; avoid over-engineering.
      placeholder: |
        - Approach:
        - Key libraries/tech:
        - Non-goals:
    validations:
      required: true

  - type: textarea
    id: mcp_surface
    attributes:
      label: MCP tool surface (if applicable)
      description: New/changed MCP tool names, params, outputs, errors.
      placeholder: |
        - Tool name:
        - Arguments:
        - Return shape:
        - Error cases:
    validations:
      required: false

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: Bullet list of “done” checks.
      placeholder: |
        - [ ] Works on at least 2 sample PDFs
        - [ ] Deterministic edit/remove identifiers (ids/xrefs)
        - [ ] Non-breaking default behavior
    validations:
      required: true

  - type: textarea
    id: test_plan
    attributes:
      label: Test plan
      description: Unit, CLI, MCP, and optional manual expectations.
      placeholder: |
        - Unit tests: tests/test_pdf_tools.py
        - MCP layer test: test_mcp_layer_can_call_all_tools
        - Smoke: scripts/cursor_smoke.py or a new focused script
        - Manual: pdf-mcp <verb> <tool> --json ...
    validations:
      required: true

  - type: checkboxes
    id: breaking
    attributes:
      label: Breaking change?
      options:
        - label: This change is breaking (requires explicit permission before merge)
          required: false

  - type: textarea
    id: docs
    attributes:
      label: Docs to update
      placeholder: |
        - README.md
        - CHANGELOG.md (Unreleased)
        - USAGE.md (generated, if registry/tool surface changes)
    validations:
      required: true

  - type: textarea
    id: links
    attributes:
      label: Links / references
      description: Examples, related issues/PRs, public sample PDFs, or external docs.
      placeholder: |
        - Related issues:
        - Sample PDFs or fixtures:
    validations:
      required: false


